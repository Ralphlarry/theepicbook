version: "3.9"

services:
  reverse-proxy:
    image: nginx:alpine
    container_name: epicbook-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - public
      - private

  app:
    build: .
    container_name: epicbook-app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - private
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      retries: 5
      start_period: 10s

  db:
    image: mysql:8.0
    container_name: epicbook-db
    environment:
      MYSQL_ROOT_PASSWORD: demo1234
      MYSQL_DATABASE: bookstore
    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - private
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 20s

volumes:
  db_data:

networks:
  public:
  private:
